    function splitKeywords(text) {
      return (text || "").split("•").map(item => item.trim()).filter(Boolean);
    }

    function translateKeywords(text) {
      return splitKeywords(text).map(item => keywordMap[item] || item).join(" • ");
    }

    function englishName(name) {
      return (name || "")
        .replace(/\s*\([^)]*[\u0E00-\u0E7F][^)]*\)/g, "")
        .replace(" - Thần ", " - God of ")
        .replace(" - Nữ thần ", " - Goddess of ");
    }

    function englishLegend(card) {
      const keys = translateKeywords(card.keywords);
      return `${englishName(card.name)} is read through the main themes of ${keys}. This English side gives a concise reading while the Vietnamese side keeps the full original explanation.`;
    }

    function englishVisual(card) {
      const keys = translateKeywords(card.keywords);
      return `Visual reading: observe the animal, weapon, light, water, fire, lotus, moon or ritual object shown on the card. These symbols point to ${keys}.`;
    }

    let activeSection = "all";
    let searchText = "";

    const nav = document.getElementById("sectionNav");
    const grid = document.getElementById("cardGrid");
    const searchInput = document.getElementById("searchInput");
    const activeTitle = document.getElementById("activeTitle");
    const visibleCount = document.getElementById("visibleCount");

    function renderNav() {
      const all = document.createElement("button");
      all.className = "nav-button";
      all.dataset.section = "all";
      all.innerHTML = `<strong>Tất cả bộ bài / All decks</strong><span>${DATA.cards.length} lá trong 4 mục</span>`;
      nav.appendChild(all);

      DATA.sections.forEach(section => {
        const button = document.createElement("button");
        button.className = "nav-button";
        button.dataset.section = section.id;
        button.innerHTML = `<strong>${section.title}</strong><span>${section.count} lá - ${section.subtitle}</span>`;
        nav.appendChild(button);
      });

      nav.addEventListener("click", event => {
        const button = event.target.closest("button[data-section]");
        if (!button) return;
        activeSection = button.dataset.section;
        render();
      });
    }

    function matches(card) {
      if (activeSection !== "all" && card.sectionId !== activeSection) return false;
      if (!searchText) return true;
      const text = [card.name, card.legend, card.visual, card.keywords, englishName(card.name), translateKeywords(card.keywords)].join(" ").toLowerCase();
      return text.includes(searchText.toLowerCase());
    }

    function keywordHtml(text, english = false) {
      const source = english ? translateKeywords(text) : text;
      return splitKeywords(source).map(item => `<span class="keyword">${item}</span>`).join("");
    }

    function sectionTitle() {
      if (activeSection === "all") return "Tất cả 65 lá / All 65 Cards";
      const section = DATA.sections.find(item => item.id === activeSection);
      return section ? section.title : "Tất cả 65 lá / All 65 Cards";
    }

    function renderCard(card) {
      const article = document.createElement("article");
      article.className = "card";
      article.innerHTML = `
        <div class="card-media">
          <img src="${card.image}" alt="${card.name}" loading="lazy">
        </div>
        <div class="card-body">
          <p class="card-kicker">${card.sectionTitle} - Lá ${card.number}</p>
          <h3>${card.name}</h3>
          <div class="bilingual-grid">
            <div class="lang-panel vi">
              <div class="lang-title">Tiếng Việt</div>
              <div class="info-block"><strong>Tên vị thần</strong><p>${card.name}</p></div>
              <div class="info-block"><strong>Truyền thuyết vị thần</strong><p>${card.legend}</p></div>
              <div class="info-block"><strong>Hình ảnh lá bài nghĩa gì</strong><p>${card.visual}</p></div>
              <div class="info-block"><strong>Từ khóa lá bài</strong><div class="keyword-row">${keywordHtml(card.keywords)}</div></div>
            </div>
            <div class="lang-panel en">
              <div class="lang-title">English</div>
              <div class="info-block"><strong>Deity / Card Name</strong><p>${englishName(card.name)}</p></div>
              <div class="info-block"><strong>Myth Summary</strong><p>${englishLegend(card)}</p></div>
              <div class="info-block"><strong>Visual Meaning</strong><p>${englishVisual(card)}</p></div>
              <div class="info-block"><strong>Card Keywords</strong><div class="keyword-row">${keywordHtml(card.keywords, true)}</div></div>
            </div>
          </div>
        </div>
      `;
      return article;
    }

    function render() {
      document.querySelectorAll(".nav-button").forEach(button => {
        button.classList.toggle("active", button.dataset.section === activeSection);
      });
      activeTitle.textContent = sectionTitle();
      const cards = DATA.cards.filter(matches);
      visibleCount.textContent = cards.length;
      grid.innerHTML = "";
      cards.forEach(card => grid.appendChild(renderCard(card)));
    }

    searchInput.addEventListener("input", event => {
      searchText = event.target.value.trim();
      render();
    });

    renderNav();
    render();
  </script>
